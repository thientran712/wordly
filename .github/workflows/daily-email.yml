name: Send Daily Word Emails

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 min — route filters by each user's preferred time
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  send-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger email cron
        run: |
          # Strip trailing slash from URL
          BASE_URL="${{ secrets.VERCEL_APP_URL }}"
          BASE_URL="${BASE_URL%/}"

          echo "Calling: $BASE_URL/api/cron/send-daily-emails"

          response=$(curl -s -L --location-trusted \
            -o /tmp/response_body.txt \
            -w "%{http_code}" \
            -X GET "$BASE_URL/api/cron/send-daily-emails" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "Response status: $response"
          echo "Response body: $(cat /tmp/response_body.txt)"

          if [ "$response" != "200" ]; then
            echo "❌ Cron failed with status $response"
            exit 1
          fi

          echo "✅ Cron triggered successfully"
